audio:
  channels: 1
  sample_rate: 16000
  temp_dir: data/temp
embedding:
  model: paraphrase-multilingual-MiniLM-L12-v2
export:
  default_dir: ''
  include_corrections: true
  include_raw_transcript: true
feedback:
  dir: data/feedback
knowledge_base:
  chroma_dir: data/chroma
  terms_dir: data/terms
ollama:
  base_url: http://localhost:11434
  model: gemma4:e2b
  options:
    num_ctx: 8192
    temperature: 0.3
sessions:
  dir: data/sessions
streaming:
  audio_chunk_duration_sec: 600
  final_summary_timeout_sec: 120
  pending_summary_wait_sec: 60
  stop_drain_timeout_sec: 90
  summary_interval_sec: 180
  summary_min_new_segments: 10
  transcribe_chunk_sec: 10
whisper:
  device: cpu
  language: zh
  model: small
